name: Deploy to metacrystal.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@metacrystal.com <<'SFTP'
          put holly-poppins.html /home/nstrupp/metacrystal.com/holly-poppins.html
          put admin.html /home/nstrupp/metacrystal.com/admin.html
          SFTP

      - name: Confirm
        run: echo "✅ Deployed holly-poppins.html and admin.html to metacrystal.com"
